<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commentary Orchestrator Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe5;
      --card: #fffdf8;
      --ink: #1f1f19;
      --muted: #6a675c;
      --line: #d4cbb8;
      --accent: #9e5b31;
      --accent-soft: #f3dfcf;
      --good: #2f7d4d;
      --warn: #a56308;
      --bad: #b93f2f;
      --idle: #69737f;
      --running: #0d6b8a;
      --shadow: 0 14px 28px rgba(61, 49, 35, 0.08);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(158, 91, 49, 0.12), transparent 24rem),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-body { padding: 16px 20px 20px; }
    h1, h2, h3 { margin: 0; font-weight: 700; }
    h1 { font-size: 24px; letter-spacing: -0.02em; }
    h2 { font-size: 18px; }
    h3 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    p, label, span, td, th, input, select, button, pre { font-size: 14px; }
    .muted { color: var(--muted); }

    .stack { display: grid; gap: 18px; }
    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    input, select, button {
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: white;
      color: var(--ink);
    }

    button {
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    button.secondary {
      background: white;
      color: var(--ink);
      border-color: var(--line);
    }

    button.warn {
      background: #fff2df;
      color: #8d4e07;
      border-color: #e6c79a;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .toolbar, .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .runs {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 270px);
      overflow: auto;
      padding-right: 4px;
    }

    .run-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: white;
      cursor: pointer;
      display: grid;
      gap: 8px;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .run-card:hover { transform: translateY(-1px); }
    .run-card.selected {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
      background: var(--accent-soft);
    }

    .run-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .run-name {
      font-weight: 700;
      word-break: break-word;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status-running { background: #dff2f8; color: var(--running); border-color: #b9deea; }
    .status-completed { background: #e2f5e7; color: var(--good); border-color: #bdddc7; }
    .status-failed { background: #fde7e3; color: var(--bad); border-color: #efbeb7; }
    .status-needs_human, .status-blocked_routed, .status-untracked_active, .status-stale, .status-awaiting_review, .status-review_blocked, .status-review_blocked_routed, .status-review_failed_routed, .status-review_resolution_routed {
      background: #fff0dc; color: var(--warn); border-color: #e6c79a;
    }
    .status-stopped, .status-unknown, .status-not_started { background: #edf0f3; color: var(--idle); border-color: #d7dce2; }
    .status-review_failed { background: #fde7e3; color: var(--bad); border-color: #efbeb7; }
    .status-queued, .status-retry_queued { background: #e8eef8; color: #426893; border-color: #c8d5ea; }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 16px;
    }

    .meta-item strong {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .detail-layout {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 16px;
      min-height: calc(100vh - 48px);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 14px;
    }

    .summary-box .value {
      font-size: 18px;
      font-weight: 700;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #eee6d9;
      vertical-align: top;
    }

    th {
      background: #faf4ea;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    tbody tr.selected-row { background: #fff8ef; }
    tbody tr:hover { background: #fffbf4; }
    tbody td:first-child { font-weight: 600; }

    .table-wrap {
      overflow: auto;
      border-radius: 14px;
    }

    pre {
      margin: 0;
      padding: 16px;
      background: #161812;
      color: #f6f2e9;
      border-radius: 14px;
      min-height: 220px;
      overflow: auto;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .small { font-size: 12px; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.65);
    }

    @media (max-width: 1180px) {
      .page { grid-template-columns: 1fr; }
      .runs { max-height: none; }
      .detail-layout { min-height: auto; }
      .summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="stack">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h1>오케스트레이터</h1>
            <div class="muted small">Commentary workflow 진행 관리 화면</div>
          </div>
        </div>
        <div class="panel-body">
          <form id="launch-form">
            <div class="field">
              <label for="workflow-path">작업 설계 파일</label>
              <input id="workflow-path" name="workflow-path" type="text">
            </div>
            <div class="field">
              <label for="runner">실행 방식</label>
              <select id="runner" name="runner">
                <option value="codex">codex</option>
                <option value="mock">mock</option>
              </select>
            </div>
            <div class="field">
              <label for="state-dir">저장 폴더 (선택)</label>
              <input id="state-dir" name="state-dir" type="text" placeholder="비워두면 tmp 아래에 자동 생성">
            </div>
            <div class="button-row">
              <button type="submit">실행 시작</button>
              <button type="button" id="refresh-runs" class="secondary">새로고침</button>
            </div>
          </form>
          <div style="margin-top: 12px;" class="toolbar">
            <label><input id="auto-refresh" type="checkbox" checked> 자동 새로고침</label>
            <span class="muted small" id="status-line">불러오는 중...</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>실행 목록</h2>
            <div class="muted small" id="runs-root-line">...</div>
          </div>
        </div>
        <div class="panel-body">
          <div id="run-list" class="runs"></div>
        </div>
      </section>
    </aside>

    <main class="panel">
      <div class="panel-header">
        <div>
          <h2 id="detail-title">홈</h2>
          <div class="muted small" id="detail-subtitle">왼쪽에서 실행을 선택하거나 새 실행을 시작하세요.</div>
        </div>
        <div class="button-row">
          <button type="button" id="go-home" class="secondary">홈으로</button>
          <button type="button" id="open-run" class="secondary" disabled>폴더 열기</button>
          <button type="button" id="stop-run" class="warn" disabled>실행 중지</button>
        </div>
      </div>
      <div class="panel-body detail-layout">
        <div id="summary-strip" class="summary-strip"></div>
        <div class="meta-grid" id="run-meta"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>단계</th>
                <th>상태</th>
                <th>시도</th>
                <th>최근 시각</th>
                <th>요약</th>
                <th>보기</th>
              </tr>
            </thead>
            <tbody id="task-table"></tbody>
          </table>
        </div>
        <section>
          <div class="panel-header" style="padding: 0 0 12px; border-bottom: none;">
            <div>
              <h2 id="log-title">상세 기록</h2>
              <div class="muted small" id="log-path">아직 선택된 기록이 없습니다.</div>
            </div>
          </div>
          <pre id="log-viewer">왼쪽 표에서 단계별 기록 버튼을 누르면 여기에서 내용을 볼 수 있습니다.</pre>
        </section>
      </div>
    </main>
  </div>

  <script>
    const state = {
      config: null,
      runs: [],
      selectedRun: null,
      selectedDetails: null,
      selectedTask: null,
      refreshHandle: null,
      homeMode: true,
    };

    const statusLabels = {
      running: "진행 중",
      completed: "완료",
      failed: "실패",
      needs_human: "사람 확인 필요",
      blocked_routed: "자동 우회 처리 중",
      awaiting_review: "검토 대기",
      review_blocked: "검토에서 막힘",
      review_failed: "검토 실패",
      review_blocked_routed: "검토 문제 자동 해결 중",
      review_failed_routed: "검토 실패 자동 해결 중",
      review_resolution_routed: "검토 보정 단계 진행 중",
      untracked_active: "오래된 실행 흔적",
      stale: "오래된 실행 흔적",
      stopped: "중지됨",
      unknown: "알 수 없음",
      not_started: "아직 시작 전",
      queued: "대기 중",
      retry_queued: "재시도 대기",
    };

    const logKindLabels = {
      stdout: "진행 기록",
      stderr: "문제 기록",
      result: "최종 답변",
      block: "막힘 사유",
    };

    function statusClass(status) {
      return `status-${String(status || "unknown").replaceAll(" ", "_")}`;
    }

    function displayStatus(status) {
      return statusLabels[status] || status || "알 수 없음";
    }

    function displayLogKind(kind) {
      return logKindLabels[kind] || kind;
    }

    function formatList(items) {
      return items && items.length ? items.join(", ") : "-";
    }

    function shortPath(path) {
      if (!path) return "-";
      const parts = path.split(/[\\/]/);
      return parts[parts.length - 1];
    }

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }
      return payload;
    }

    async function loadConfig() {
      state.config = await requestJson("/api/config");
      document.getElementById("workflow-path").value = state.config.default_workflow;
      document.getElementById("runs-root-line").textContent = state.config.runs_root;
    }

    function renderRuns() {
      const list = document.getElementById("run-list");
      if (!state.runs.length) {
        list.innerHTML = `<div class="empty">저장된 실행이 아직 없습니다.</div>`;
        return;
      }
      list.innerHTML = state.runs.map((run) => `
        <div class="run-card ${state.selectedRun === run.state_dir ? "selected" : ""}" data-state-dir="${run.state_dir}">
          <div class="run-top">
            <div class="run-name">${shortPath(run.state_dir)}</div>
            <span class="badge ${statusClass(run.run_status)}">${displayStatus(run.run_status)}</span>
          </div>
          <div class="small muted">${shortPath(run.workflow_path || "")}</div>
          <div class="small">지금 진행: ${formatList(run.running_tasks)}</div>
          <div class="small">실패: ${formatList(run.failed_tasks)}</div>
          <div class="small">확인 필요: ${formatList(run.needs_human_tasks)}</div>
          <div class="small muted">업데이트: ${run.updated_at || "-"}</div>
        </div>
      `).join("");

      list.querySelectorAll(".run-card").forEach((card) => {
        card.addEventListener("click", () => selectRun(card.dataset.stateDir));
      });
    }

    function renderSummaryStrip(summary) {
      const strip = document.getElementById("summary-strip");
      const items = [
        ["현재 상태", displayStatus(summary.run_status)],
        ["대기 단계 수", String(summary.queue_length || 0)],
        ["실행 PID", summary.orchestrator_pid ? `${summary.orchestrator_pid}` : "-"],
        ["막힘 기록 수", String(summary.block_context_count || 0)],
      ];
      strip.innerHTML = items.map(([label, value]) => `
        <div class="summary-box">
          <div class="small muted">${label}</div>
          <div class="value">${value}</div>
        </div>
      `).join("");
    }

    function renderRunMeta(summary) {
      const meta = document.getElementById("run-meta");
      const items = [
        ["저장 폴더", summary.state_dir],
        ["작업 설계 파일", summary.workflow_path || "-"],
        ["실행 방식", summary.runner || "-"],
        ["마지막 업데이트", summary.updated_at || "-"],
        ["지금 진행 중", formatList(summary.running_tasks)],
        ["다음 대기", formatList(summary.queue)],
        ["실패한 단계", formatList(summary.failed_tasks)],
        ["사람 확인 필요", formatList(summary.needs_human_tasks)],
      ];
      meta.innerHTML = items.map(([label, value]) => `
        <div class="meta-item">
          <strong>${label}</strong>
          <div>${value || "-"}</div>
        </div>
      `).join("");
    }

    function renderHomeState() {
      state.selectedRun = null;
      state.selectedDetails = null;
      state.selectedTask = null;
      state.homeMode = true;
      document.getElementById("open-run").disabled = true;
      document.getElementById("stop-run").disabled = true;
      document.getElementById("detail-title").textContent = "홈";
      document.getElementById("detail-subtitle").textContent = "왼쪽 실행 목록에서 하나를 선택하면 상세 내용을 볼 수 있습니다.";
      document.getElementById("summary-strip").innerHTML = `
        <div class="summary-box"><div class="small muted">현재 상태</div><div class="value">대기 중</div></div>
        <div class="summary-box"><div class="small muted">할 수 있는 일</div><div class="value">실행 선택</div></div>
        <div class="summary-box"><div class="small muted">새 실행</div><div class="value">왼쪽에서 시작</div></div>
        <div class="summary-box"><div class="small muted">기록 보기</div><div class="value">단계 선택 후 확인</div></div>
      `;
      document.getElementById("run-meta").innerHTML = `
        <div class="empty" style="grid-column: 1 / -1;">
          실행을 하나 선택하면 현재 상태, 대기 단계, 막힘 여부, 기록 버튼이 여기 표시됩니다.
        </div>
      `;
      document.getElementById("task-table").innerHTML = `
        <tr><td colspan="6" class="empty">아직 선택된 실행이 없습니다.</td></tr>
      `;
      document.getElementById("log-title").textContent = "상세 기록";
      document.getElementById("log-path").textContent = "아직 선택된 기록이 없습니다.";
      document.getElementById("log-viewer").textContent = "진행 기록, 문제 기록, 최종 답변, 막힘 사유를 여기에서 볼 수 있습니다.";
    }

    function renderTaskTable(details) {
      const body = document.getElementById("task-table");
      if (!details.tasks.length) {
        body.innerHTML = `<tr><td colspan="6" class="empty">아직 기록된 단계가 없습니다.</td></tr>`;
        return;
      }
      body.innerHTML = details.tasks.map((task) => `
        <tr class="${state.selectedTask === task.task_id ? "selected-row" : ""}" data-task-id="${task.task_id}">
          <td>${task.task_id}</td>
          <td><span class="badge ${statusClass(task.status)}">${displayStatus(task.status)}</span></td>
          <td>${task.attempts || 0}</td>
          <td class="small muted">${task.last_finished_at || task.last_started_at || "-"}</td>
          <td>${task.summary || task.last_error || "-"}</td>
          <td>
            <div class="button-row">
              <button type="button" title="이 단계가 실제로 어떤 순서로 진행 중인지 보여줍니다." class="secondary log-button" data-task-id="${task.task_id}" data-kind="stdout" ${task.stdout_path ? "" : "disabled"}>${displayLogKind("stdout")}</button>
              <button type="button" title="오류나 경고처럼 문제가 있었던 출력입니다." class="secondary log-button" data-task-id="${task.task_id}" data-kind="stderr" ${task.stderr_path ? "" : "disabled"}>${displayLogKind("stderr")}</button>
              <button type="button" title="Codex가 마지막에 반환한 구조화된 최종 답변입니다." class="secondary log-button" data-task-id="${task.task_id}" data-kind="result" ${task.result_path ? "" : "disabled"}>${displayLogKind("result")}</button>
              <button type="button" title="막힘이 발생했을 때 왜 막혔는지 정리한 파일입니다." class="secondary log-button" data-task-id="${task.task_id}" data-kind="block" ${task.block_context_path ? "" : "disabled"}>${displayLogKind("block")}</button>
            </div>
          </td>
        </tr>
      `).join("");

      body.querySelectorAll("tr[data-task-id]").forEach((row) => {
        row.addEventListener("click", () => {
          state.selectedTask = row.dataset.taskId;
          renderTaskTable(details);
        });
      });

      body.querySelectorAll(".log-button").forEach((button) => {
        button.addEventListener("click", async (event) => {
          event.stopPropagation();
          await loadTaskLog(button.dataset.taskId, button.dataset.kind);
        });
      });
    }

    async function loadRuns() {
      const payload = await requestJson("/api/runs");
      state.runs = payload.runs;
      renderRuns();
      const statusLine = document.getElementById("status-line");
      statusLine.textContent = `마지막 새로고침: ${new Date().toLocaleTimeString()}`;
      if (state.selectedRun) {
        const exists = state.runs.some((run) => run.state_dir === state.selectedRun);
        if (exists) {
          await loadRunDetails(state.selectedRun, false);
          renderRuns();
        } else {
          renderHomeState();
        }
      } else if (state.homeMode) {
        renderHomeState();
      }
    }

    async function selectRun(stateDir) {
      state.homeMode = false;
      state.selectedRun = stateDir;
      document.getElementById("open-run").disabled = false;
      document.getElementById("stop-run").disabled = false;
      await loadRunDetails(stateDir, true);
      renderRuns();
    }

    async function loadRunDetails(stateDir, resetLog) {
      const details = await requestJson(`/api/run-details?state_dir=${encodeURIComponent(stateDir)}`);
      state.selectedDetails = details;
      if (resetLog) {
        state.selectedTask = null;
        document.getElementById("log-title").textContent = "상세 기록";
        document.getElementById("log-path").textContent = "단계별 기록 버튼을 누르면 내용이 표시됩니다.";
        document.getElementById("log-viewer").textContent = "아직 선택된 기록이 없습니다.";
      }
      const summary = details.summary;
      document.getElementById("detail-title").textContent = shortPath(summary.state_dir);
      document.getElementById("detail-subtitle").textContent = `${displayStatus(summary.run_status)} | ${summary.updated_at || "-"}`;
      renderSummaryStrip(summary);
      renderRunMeta(summary);
      renderTaskTable(details);
    }

    async function loadTaskLog(taskId, kind) {
      if (!state.selectedRun) return;
      const payload = await requestJson(
        `/api/task-log?state_dir=${encodeURIComponent(state.selectedRun)}&task_id=${encodeURIComponent(taskId)}&kind=${encodeURIComponent(kind)}&lines=240`
      );
      state.selectedTask = taskId;
      document.getElementById("log-title").textContent = `${taskId} / ${displayLogKind(kind)}`;
      document.getElementById("log-path").textContent = payload.path;
      document.getElementById("log-viewer").textContent = payload.content || "(비어 있음)";
      if (state.selectedDetails) {
        renderTaskTable(state.selectedDetails);
      }
    }

    async function launchRun(event) {
      event.preventDefault();
      const workflowPath = document.getElementById("workflow-path").value.trim();
      const runner = document.getElementById("runner").value;
      const stateDir = document.getElementById("state-dir").value.trim();
      const payload = {
        workflow_path: workflowPath,
        runner,
      };
      if (stateDir) payload.state_dir = stateDir;
      await requestJson("/api/launch", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      document.getElementById("state-dir").value = "";
      await loadRuns();
      if (state.runs.length) {
        await selectRun(state.runs[0].state_dir);
      }
    }

    async function stopRun() {
      if (!state.selectedRun) return;
      await requestJson("/api/stop", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ state_dir: state.selectedRun }),
      });
      await loadRuns();
      await loadRunDetails(state.selectedRun, false);
    }

    async function openRunFolder() {
      if (!state.selectedRun) return;
      await requestJson("/api/open", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ state_dir: state.selectedRun }),
      });
    }

    function startAutoRefresh() {
      if (state.refreshHandle) clearInterval(state.refreshHandle);
      state.refreshHandle = setInterval(() => {
        if (document.getElementById("auto-refresh").checked) {
          loadRuns().catch((error) => {
            document.getElementById("status-line").textContent = error.message;
          });
        }
      }, 3000);
    }

    async function main() {
      try {
        await loadConfig();
        await loadRuns();
      } catch (error) {
        document.getElementById("status-line").textContent = error.message;
      }
      document.getElementById("launch-form").addEventListener("submit", launchRun);
      document.getElementById("refresh-runs").addEventListener("click", () => loadRuns());
      document.getElementById("go-home").addEventListener("click", renderHomeState);
      document.getElementById("stop-run").addEventListener("click", stopRun);
      document.getElementById("open-run").addEventListener("click", openRunFolder);
      startAutoRefresh();
    }

    main();
  </script>
</body>
</html>
