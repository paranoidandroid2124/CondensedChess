include "base"
include "version"

# Open-beta runtime for GCP / Cloud Run.
# This file keeps dev defaults in base.conf out of production and maps the
# service to environment variables / Secret Manager-backed values.

play.http.secret.key = ${PLAY_HTTP_SECRET_KEY}

user.password.bpass.secret = ${USER_PASSWORD_BPASS_SECRET}

auth.magicLink.autoCreate = false

net.site.name = "Chesstory"
net.domain = ${LILA_DOMAIN}
net.socket.domains = [ ${LILA_DOMAIN} ]
net.socket.alts = []
net.asset.domain = ${LILA_DOMAIN}
net.asset.base_url = ${LILA_BASE_URL}
net.base_url = ${LILA_BASE_URL}
net.email = ${PUBLIC_CONTACT_EMAIL}
net.crawlable = ${?ENABLE_CRAWLABLE}
net.ratelimit = ${ENABLE_RATE_LIMITING}

mongodb.uri = ${MONGODB_URI}
study.mongodb.uri = ${mongodb.uri}
insight.mongodb.uri = ${mongodb.uri}
redis.uri = ${REDIS_URI}

security.password_reset.secret = ${PASSWORD_RESET_SECRET}
security.email_confirm.enabled = true
security.email_confirm.secret = ${EMAIL_CONFIRM_SECRET}
security.email_change.secret = ${EMAIL_CHANGE_SECRET}
security.login_token.secret = ${LOGIN_TOKEN_SECRET}

mailer.primary.mock = false
mailer.primary.tls = ${SMTP_TLS}
mailer.primary.host = ${SMTP_HOST}
mailer.primary.port = ${SMTP_PORT}
mailer.primary.user = ${SMTP_USER}
mailer.primary.password = ${SMTP_PASSWORD}
mailer.primary.sender = ${SMTP_SENDER}
mailer.secondary = ${mailer.primary}

hcaptcha.enabled = true
hcaptcha.public.sitekey = ${HCAPTCHA_SITEKEY}
hcaptcha.secret = ${HCAPTCHA_SECRET}

kamon.enabled = ${?ENABLE_MONITORING}
kamon.environment.service = "chesstory-openbeta"
kamon.prometheus.lilaKey = ${PROMETHEUS_KEY}
api.influx_event.endpoint = ""
api.influx_event.env = "openbeta"

support.links.patreon = ${?SUPPORT_PATREON_URL}
support.links.githubSponsors = ${?SUPPORT_GITHUB_SPONSORS_URL}
support.links.buyMeACoffee = ${?SUPPORT_BMC_URL}

push.web.url = ""
push.web.vapid_public_key = ""
push.firebase.lichobile.url = ""
push.firebase.mobile.url = ""

explorer.endpoint = ${EXPLORER_API_BASE}
explorer.internal_endpoint = ${EXPLORER_API_BASE}
explorer.tablebase_endpoint = ${TABLEBASE_API_BASE}
explorer.api_token = ${?LICHESS_EXPLORER_TOKEN}
external.import.lichess.api_base = ${LICHESS_IMPORT_API_BASE}
external.import.lichess.web_base = ${LICHESS_WEB_BASE}
external.import.chesscom.api_base = ${CHESSCOM_API_BASE}
externalEngine.endpoint = ${EXTERNAL_ENGINE_ENDPOINT}

game.gifUrl = ""
game.gifUrl = ${?GIF_EXPORT_URL}

accountIntel.worker.enabled = true
accountIntel.worker.enabled = ${?ACCOUNT_INTEL_WORKER_ENABLED}
accountIntel.worker.authHeaderValue = ""
accountIntel.worker.authHeaderValue = ${?ACCOUNT_INTEL_WORKER_TOKEN}
accountIntel.dispatch.baseUrl = ""
accountIntel.dispatch.baseUrl = ${?ACCOUNT_INTEL_DISPATCH_BASE_URL}
accountIntel.dispatch.bearerToken = ""
accountIntel.dispatch.bearerToken = ${?ACCOUNT_INTEL_DISPATCH_BEARER_TOKEN}
accountIntel.dispatch.authHeaderValue = ""
accountIntel.dispatch.authHeaderValue = ${?ACCOUNT_INTEL_WORKER_TOKEN}
accountIntel.selectiveEval.endpoint = ""
accountIntel.selectiveEval.endpoint = ${?ACCOUNT_INTEL_SELECTIVE_EVAL_ENDPOINT}
